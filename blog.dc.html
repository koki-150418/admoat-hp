<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="responsive.css"/>
<style>
*{box-sizing:border-box;}
body{margin:0;background:#FBFAF7;color:#1A1714;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}
a{color:inherit;}
</style>
</helmet>

<dc-import name="Header" active="blog" hint-size="100%,68px"></dc-import>

<main style="overflow-x:hidden;">
  <section style="background:#fff;border-bottom:1px solid #ECE7DE;">
    <div style="max-width:1200px;margin:0 auto;padding:64px 32px 56px;">
      <div style="font-family:Archivo,sans-serif;font-weight:700;font-size:13px;letter-spacing:0.18em;color:#E8401D;">BLOG</div>
      <h1 style="margin:14px 0 0;font-weight:900;font-size:44px;letter-spacing:-0.01em;color:#1A1714;">ブログ</h1>
      <p style="margin:16px 0 0;font-size:16px;line-height:1.85;color:#5C564C;max-width:640px;">Meta広告・運用ノウハウ・店舗集客のヒントを発信します。</p>
    </div>
  </section>

  <section style="max-width:1200px;margin:0 auto;padding:72px 32px;">
    <!-- CATEGORY FILTER (ダミー) -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:36px;">
      <span style="font-size:13px;font-weight:700;color:#fff;background:#1A1714;padding:8px 16px;border-radius:999px;">すべて</span>
      <span style="font-size:13px;font-weight:500;color:#5C564C;background:#fff;border:1px solid #ECE7DE;padding:8px 16px;border-radius:999px;">運用ノウハウ</span>
      <span style="font-size:13px;font-weight:500;color:#5C564C;background:#fff;border:1px solid #ECE7DE;padding:8px 16px;border-radius:999px;">店舗集客</span>
      <span style="font-size:13px;font-weight:500;color:#5C564C;background:#fff;border:1px solid #ECE7DE;padding:8px 16px;border-radius:999px;">採用広告</span>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:28px;">
      <sc-for list="{{ posts }}" as="p" hint-placeholder-count="3">
        <a href="blog-post.dc.html" style="text-decoration:none;display:flex;flex-direction:column;background:#fff;border:1px solid #ECE7DE;border-radius:20px;overflow:hidden;" style-hover="box-shadow:0 18px 40px rgba(26,23,20,0.08);transform:translateY(-4px);transition:all .2s;">
          <div style="position:relative;height:180px;background:repeating-linear-gradient(135deg,#F3EEE5 0 14px,#FBFAF7 14px 28px);display:flex;align-items:center;justify-content:center;border-bottom:1px solid #ECE7DE;">
            <span style="position:absolute;top:14px;left:14px;font-size:11px;font-weight:800;letter-spacing:0.04em;color:#fff;background:linear-gradient(100deg,#EE7A00,#E8401D);padding:5px 11px;border-radius:999px;">{{ p.cat }}</span>
            <span style="font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#9A9488;">[ アイキャッチ画像 ]</span>
          </div>
          <div style="padding:24px;display:flex;flex-direction:column;flex:1;">
            <div style="font-family:Archivo,sans-serif;font-size:12px;font-weight:600;color:#9A9488;letter-spacing:0.04em;">{{ p.date }}</div>
            <h3 style="margin:10px 0 0;font-weight:700;font-size:18px;line-height:1.55;color:#1A1714;">{{ p.title }}</h3>
            <p style="margin:10px 0 0;font-size:14px;line-height:1.8;color:#5C564C;flex:1;">{{ p.excerpt }}</p>
            <span style="margin-top:16px;font-size:13px;font-weight:700;color:#E8401D;">続きを読む →</span>
          </div>
        </a>
      </sc-for>
    </div>

    <p style="margin:40px 0 0;font-size:14px;color:#7C766B;text-align:center;">※ 記事は順次追加していきます。</p>
  </section>
</main>

<dc-import name="Footer" hint-size="100%,320px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820}}">
class Component extends DCLogic {
  renderVals() {
    const posts = [
      { cat: '運用ノウハウ', date: '2026.06.20', title: 'Meta広告で“最初の1万円”を無駄にしない初期設計の考え方', excerpt: 'はじめてのMeta広告で意識したい、予算配分とターゲティングの基本を整理しました。' },
      { cat: '店舗集客', date: '2026.06.12', title: '来店に繋がる店舗向けクリエイティブ、3つのポイント', excerpt: '「保存される」「来店したくなる」広告クリエイティブに共通する要素を解説します。' },
      { cat: '採用広告', date: '2026.06.03', title: '求人媒体に頼らない。Meta広告で採用母集団をつくる', excerpt: '採用にもMeta広告が有効な理由と、応募に繋げるための配信設計を紹介します。' },
    ];
    return { posts };
  }
}
</script>
</body>
</html>
