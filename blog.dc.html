<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/><link rel="stylesheet" href="responsive.css"/><style>*{box-sizing:border-box;}body{margin:0;background:#FAF8F4;color:#211C17;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}a{color:inherit;}.wrap{max-width:1120px;margin:0 auto;padding:0 32px;}.eyebrow{font-size:11px;letter-spacing:0.24em;color:#BC4A28;font-weight:500;}.disp{font-family:'Noto Serif JP',serif;font-weight:400;color:#211C17;letter-spacing:0.03em;}.lead{font-size:15px;line-height:2.2;color:#5A544C;}.btn{display:inline-block;text-decoration:none;font-size:13px;letter-spacing:0.1em;font-weight:500;color:#fff;background:#211C17;padding:16px 34px;border-radius:2px;}.postgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}.postcard{display:flex;flex-direction:column;text-decoration:none;background:#fff;border:1px solid #E1DACE;border-radius:4px;overflow:hidden;}.postimg{position:relative;height:170px;background:repeating-linear-gradient(135deg,#F3EFE8 0 14px,#FAF8F4 14px 28px);border-bottom:1px solid #E1DACE;display:flex;align-items:center;justify-content:center;}.posttag{position:absolute;top:14px;left:14px;font-size:11px;font-weight:500;letter-spacing:0.06em;color:#fff;background:#BC4A28;padding:5px 12px;border-radius:2px;}.postph{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#A89F92;}.postbody{padding:26px 24px 28px;display:flex;flex-direction:column;flex:1;}.postdate{font-size:12px;font-weight:500;letter-spacing:0.06em;color:#A89F92;}.postt{margin:12px 0 0;font-family:'Noto Serif JP',serif;font-weight:500;font-size:17px;letter-spacing:0.03em;color:#211C17;line-height:1.65;}.postd{margin:12px 0 0;font-size:13.5px;line-height:1.95;color:#6F6860;flex:1;}.postarrow{margin-top:18px;font-size:12.5px;font-weight:500;letter-spacing:0.06em;color:#BC4A28;}</style></helmet>

<dc-import name="Header" active="blog" hint-size="100%,73px"></dc-import>

<main style="overflow-x:hidden;">
  <section style="background:#fff;border-bottom:1px solid #E7E1D7;">
    <div class="wrap" style="padding-top:80px;padding-bottom:72px;">
      <div class="eyebrow">BLOG</div>
      <h1 class="disp" style="margin:24px 0 0;font-size:40px;line-height:1.5;">ブログ</h1>
      <p class="lead" style="margin:24px 0 0;max-width:600px;">Meta広告・運用ノウハウ・店舗集客のヒントを発信します。</p>
    </div>
  </section>

  <section style="padding:8px 0 24px;">
    <div class="wrap">
      <div class="postgrid">
        <sc-for list="{{ posts }}" as="p" hint-placeholder-count="3">
          <a href="{{ p.href }}" class="postcard" style-hover="border-color:#BC4A28;transform:translateY(-4px);box-shadow:0 18px 40px rgba(33,28,23,0.08);transition:all .2s;">
            <div class="postimg" style="{{ p.imgStyle }}">
              <span class="posttag">{{ p.cat }}</span>
              <sc-if value="{{ !p.hasImage }}" hint-placeholder-val="{{ true }}">
                <span class="postph">[ アイキャッチ画像 ]</span>
              </sc-if>
            </div>
            <div class="postbody">
              <div class="postdate">{{ p.date }}</div>
              <h3 class="postt">{{ p.title }}</h3>
              <p class="postd">{{ p.excerpt }}</p>
              <span class="postarrow">続きを読む →</span>
            </div>
          </a>
        </sc-for>
      </div>
      <p style="margin:28px 0 0;font-size:13px;color:#A89F92;text-align:center;">※ 記事は順次追加していきます。</p>
    </div>
  </section>

  <section style="padding:96px 0;border-top:1px solid #E7E1D7;">
    <div class="wrap" style="max-width:720px;text-align:center;">
      <h2 class="disp" style="margin:0;font-size:28px;line-height:1.7;">まずは、お気軽に<br/>ご相談ください。</h2>
      <p class="lead" style="margin:24px auto 0;max-width:480px;">初回のご相談は無料です。お気軽にお問い合わせください。</p>
      <div style="margin-top:38px;"><a href="contact.dc.html" class="btn" style-hover="background:#BC4A28;">無料で相談する</a></div>
    </div>
  </section>
</main>

<dc-import name="Footer" hint-size="100%,300px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820}}">
class Component extends DCLogic {
  renderVals() {
    const posts = [
      /* POSTS:START */
      { cat: '運用ノウハウ', date: '2026.06.20', title: 'Meta広告で"最初の1万円"を無駄にしない初期設計の考え方', excerpt: 'はじめてのMeta広告で意識したい、予算配分とターゲティングの基本を整理しました。', href: 'post-twv0yew6gwri.dc.html' },
      { cat: '店舗集客', date: '2026.06.12', title: '来店に繋がる店舗向けクリエイティブ、3つのポイント', excerpt: '「保存される」「来店したくなる」広告クリエイティブに共通する要素を解説します。', href: 'post-17832562515351jc7akrt.dc.html' },
      { cat: '採用広告', date: '2026.06.03', title: '求人媒体に頼らない。Meta広告で採用母集団をつくる', excerpt: '採用にもMeta広告が有効な理由と、応募に繋げるための配信設計を紹介します。', href: 'post-1783256251770dy3kt2m3.dc.html' },
      /* POSTS:END */
    ];
    return { posts };
  }
}
</script>
</body>
</html>
