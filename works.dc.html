<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/><link rel="stylesheet" href="responsive.css"/><style>*{box-sizing:border-box;}body{margin:0;background:#FAF8F4;color:#211C17;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}a{color:inherit;}.wrap{max-width:1120px;margin:0 auto;padding:0 32px;}.eyebrow{font-size:11px;letter-spacing:0.24em;color:#BC4A28;font-weight:500;}.disp{font-family:'Noto Serif JP',serif;font-weight:400;color:#211C17;letter-spacing:0.03em;}.lead{font-size:15px;line-height:2.2;color:#5A544C;}.btn{display:inline-block;text-decoration:none;font-size:13px;letter-spacing:0.1em;font-weight:500;color:#fff;background:#211C17;padding:16px 34px;border-radius:2px;}.lnk{display:inline-flex;align-items:center;gap:9px;text-decoration:none;font-size:13px;letter-spacing:0.08em;color:#211C17;border-bottom:1px solid #211C17;padding-bottom:4px;}.casegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}.casecard{display:flex;flex-direction:column;text-decoration:none;background:#fff;border:1px solid #E1DACE;border-radius:4px;overflow:hidden;}.caseimg{position:relative;height:170px;background:repeating-linear-gradient(135deg,#F3EFE8 0 14px,#FAF8F4 14px 28px);border-bottom:1px solid #E1DACE;display:flex;align-items:center;justify-content:center;}.casetag{position:absolute;top:14px;left:14px;font-size:11px;font-weight:500;letter-spacing:0.06em;color:#fff;background:#BC4A28;padding:5px 12px;border-radius:2px;}.caseph{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#A89F92;}.casebody{padding:26px 24px 28px;display:flex;flex-direction:column;flex:1;}.caset{margin:0;font-family:'Noto Serif JP',serif;font-weight:500;font-size:18px;letter-spacing:0.03em;color:#211C17;line-height:1.6;}.cased{margin:12px 0 0;font-size:13.5px;line-height:1.95;color:#6F6860;flex:1;}.casearrow{margin-top:18px;font-size:12.5px;font-weight:500;letter-spacing:0.06em;color:#BC4A28;}</style></helmet>

<dc-import name="Header" active="works" hint-size="100%,73px"></dc-import>

<main style="overflow-x:hidden;">
  <section style="background:#fff;border-bottom:1px solid #E7E1D7;">
    <div class="wrap" style="padding-top:80px;padding-bottom:72px;">
      <div class="eyebrow">CASE</div>
      <h1 class="disp" style="margin:24px 0 0;font-size:40px;line-height:1.5;">事例紹介</h1>
      <p class="lead" style="margin:24px 0 0;max-width:600px;">店舗集客・採用広告・EC/サービスなど、幅広い業種・目的のMeta広告に対応しています。代表的な事例カテゴリをご紹介します。各パネルをクリックすると詳細をご覧いただけます。</p>
    </div>
  </section>

  <section style="padding:8px 0 24px;">
    <div class="wrap">
      <div class="casegrid">
        <sc-for list="{{ cases }}" as="c" hint-placeholder-count="3">
          <a href="{{ c.href }}" class="casecard" style-hover="border-color:#BC4A28;transform:translateY(-4px);box-shadow:0 18px 40px rgba(33,28,23,0.08);transition:all .2s;">
            <div class="caseimg" style="{{ c.imgStyle }}">
              <span class="casetag">{{ c.label }}</span>
              <sc-if value="{{ !c.hasImage }}" hint-placeholder-val="{{ true }}">
                <span class="caseph">[ 事例ビジュアル ]</span>
              </sc-if>
            </div>
            <div class="casebody">
              <h3 class="caset">{{ c.title }}</h3>
              <p class="cased">{{ c.desc }}</p>
              <span class="casearrow">事例を見る →</span>
            </div>
          </a>
        </sc-for>
      </div>
      <p style="margin:28px 0 0;font-size:13px;color:#A89F92;">※ 具体的な数値・事例は、準備が整い次第順次掲載いたします。</p>
    </div>
  </section>

  <section style="padding:96px 0;border-top:1px solid #E7E1D7;">
    <div class="wrap" style="max-width:720px;text-align:center;">
      <h2 class="disp" style="margin:0;font-size:28px;line-height:1.7;">あなたの事業でも、<br/>成果を。</h2>
      <p class="lead" style="margin:24px auto 0;max-width:480px;">現状の課題を伺い、最適な広告運用をご提案します。</p>
      <div style="margin-top:38px;"><a href="contact.dc.html" class="btn" style-hover="background:#BC4A28;">無料で相談する</a></div>
    </div>
  </section>
</main>

<dc-import name="Footer" hint-size="100%,300px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820}}">
class Component extends DCLogic {
  renderVals() {
    const cases = [
      /* CASES:START */
      /* CASES:END */
    ];
    return { cases };
  }
}
</script>
</body>
</html>
