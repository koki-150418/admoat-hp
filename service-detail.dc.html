<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/><link rel="stylesheet" href="responsive.css"/><style>*{box-sizing:border-box;}body{margin:0;background:#FAF8F4;color:#211C17;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}a{color:inherit;}.wrap{max-width:1120px;margin:0 auto;padding:0 32px;}.disp{font-family:'Noto Serif JP',serif;font-weight:400;color:#211C17;letter-spacing:0.03em;}.lead{font-size:15px;line-height:2.2;color:#5A544C;}.btn{display:inline-block;text-decoration:none;font-size:13px;letter-spacing:0.1em;font-weight:500;color:#fff;background:#211C17;padding:16px 34px;border-radius:2px;}.lnk{display:inline-flex;align-items:center;gap:9px;text-decoration:none;font-size:13px;letter-spacing:0.08em;color:#211C17;border-bottom:1px solid #211C17;padding-bottom:4px;}.body{font-size:15px;line-height:2.1;color:#3A352E;}.body h2{margin:44px 0 0;font-family:'Noto Serif JP',serif;font-weight:500;font-size:20px;letter-spacing:0.03em;color:#211C17;}.body p{margin:16px 0 0;}</style></helmet>

<dc-import name="Header" active="services" hint-size="100%,73px"></dc-import>

<main style="overflow-x:hidden;">
  <section style="background:#fff;border-bottom:1px solid #E7E1D7;">
    <div class="wrap" style="padding-top:56px;padding-bottom:56px;">
      <a href="services.dc.html" class="lnk" style-hover="color:#BC4A28;border-color:#BC4A28;">← サービス一覧へ</a>
      <h1 class="disp" style="margin:28px 0 0;font-size:32px;line-height:1.6;max-width:720px;">サービス詳細（ダミー）</h1>
    </div>
  </section>

  <section style="padding:56px 0 96px;">
    <div class="wrap" style="max-width:760px;">
      <div class="body">
        <p style="color:#BC4A28;font-weight:500;">※ こちらはダミーページです。実際のサービス詳細に差し替えてご利用ください。</p>
        <h2>サービス内容</h2>
        <p>戦略設計から配信・改善まで、事業フェーズに合わせてカスタマイズしてご提供します。詳しいご提案は、無料相談にて承ります。</p>
        <h2>ご利用の流れ</h2>
        <p>無料相談 → お見積り・ご提案 → ご契約 → 運用開始、というシンプルな流れです。</p>
        <h2>料金について</h2>
        <p>料金は月額固定制です。詳細はサービス一覧、またはお問い合わせにてご案内します。</p>
      </div>
    </div>
  </section>

  <section style="padding:96px 0;border-top:1px solid #E7E1D7;">
    <div class="wrap" style="max-width:720px;text-align:center;">
      <h2 class="disp" style="margin:0;font-size:28px;line-height:1.7;">まずは、お気軽に<br/>ご相談ください。</h2>
      <p class="lead" style="margin:24px auto 0;max-width:480px;">初回のご相談は無料です。</p>
      <div style="margin-top:38px;"><a href="contact.dc.html" class="btn" style-hover="background:#BC4A28;">無料で相談する</a></div>
    </div>
  </section>
</main>

<dc-import name="Footer" hint-size="100%,300px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820}}"></script>
</body>
</html>
