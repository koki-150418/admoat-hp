<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="responsive.css"/>
<style>
*{box-sizing:border-box;}
body{margin:0;background:#FBFAF7;color:#1A1714;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}
a{color:inherit;}
</style>
</helmet>

<dc-import name="Header" active="recruit" hint-size="100%,68px"></dc-import>

<main style="overflow-x:hidden;">
  <section style="background:#fff;border-bottom:1px solid #ECE7DE;">
    <div style="max-width:1200px;margin:0 auto;padding:64px 32px 56px;">
      <div style="font-family:Archivo,sans-serif;font-weight:700;font-size:13px;letter-spacing:0.18em;color:#E8401D;">RECRUIT</div>
      <h1 style="margin:14px 0 0;font-weight:900;font-size:44px;letter-spacing:-0.01em;color:#1A1714;">採用情報</h1>
      <p style="margin:16px 0 0;font-size:16px;line-height:1.85;color:#5C564C;max-width:640px;">広告で事業を伸ばすことに、一緒に向き合う仲間を募集予定です。</p>
    </div>
  </section>

  <section style="max-width:1100px;margin:0 auto;padding:72px 32px;">
    <div style="background:#17140F;border-radius:24px;padding:56px;display:grid;grid-template-columns:1.3fr 0.7fr;gap:40px;align-items:center;">
      <div>
        <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 13px;border-radius:999px;background:rgba(244,180,0,0.14);font-size:12px;font-weight:700;letter-spacing:0.04em;color:#F4B400;margin-bottom:20px;">RECRUIT ・ 募集予定</div>
        <h2 style="margin:0;font-weight:900;font-size:30px;line-height:1.45;color:#fff;">一緒に、広告で<br/>事業を伸ばす仲間を。</h2>
        <p style="margin:18px 0 0;font-size:15px;line-height:1.95;color:#B7AFA2;max-width:520px;">Meta広告の運用や内製化支援に興味のある方を募集予定です。カジュアル面談から歓迎します。まずはお気軽にお問い合わせください。</p>
      </div>
      <div style="text-align:right;">
        <a href="contact.dc.html" style="display:inline-block;text-decoration:none;font-size:15px;font-weight:700;color:#17140F;padding:15px 30px;border-radius:999px;background:linear-gradient(100deg,#F4B400 0%,#EE7A00 48%,#E8401D 100%);box-shadow:0 8px 22px rgba(232,64,29,0.32);" style-hover="opacity:0.92;">話を聞いてみる</a>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:32px;">
      <div style="border:1px solid #ECE7DE;border-radius:16px;padding:28px;background:#fff;"><div style="font-weight:700;font-size:17px;color:#1A1714;">広告運用</div><p style="margin:10px 0 0;font-size:14px;line-height:1.8;color:#5C564C;">Meta広告の設計・配信・改善を担うポジション。</p></div>
      <div style="border:1px solid #ECE7DE;border-radius:16px;padding:28px;background:#fff;"><div style="font-weight:700;font-size:17px;color:#1A1714;">クリエイティブ</div><p style="margin:10px 0 0;font-size:14px;line-height:1.8;color:#5C564C;">成果につながる広告クリエイティブの企画・制作。</p></div>
      <div style="border:1px solid #ECE7DE;border-radius:16px;padding:28px;background:#fff;"><div style="font-weight:700;font-size:17px;color:#1A1714;">カジュアル面談</div><p style="margin:10px 0 0;font-size:14px;line-height:1.8;color:#5C564C;">まずは話を聞いてみたい方も歓迎しています。</p></div>
    </div>
  </section>
</main>

<dc-import name="Footer" hint-size="100%,320px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:760}}"></script>
</body>
</html>
