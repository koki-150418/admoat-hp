<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/><link rel="stylesheet" href="responsive.css"/><style>*{box-sizing:border-box;}body{margin:0;background:#FAF8F4;color:#211C17;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}a{color:inherit;}.wrap{max-width:1120px;margin:0 auto;padding:0 32px;}.eyebrow{font-size:11px;letter-spacing:0.24em;color:#BC4A28;font-weight:500;}.disp{font-family:'Noto Serif JP',serif;font-weight:400;color:#211C17;letter-spacing:0.03em;}.lead{font-size:15px;line-height:2.2;color:#5A544C;}.btn{display:inline-block;text-decoration:none;font-size:13px;letter-spacing:0.1em;font-weight:500;color:#fff;background:#211C17;padding:16px 34px;border-radius:2px;}.panel{background:#F3EFE8;border-radius:4px;padding:48px;display:grid;grid-template-columns:1.3fr 0.7fr;gap:40px;align-items:center;}.panelbadge{display:inline-block;font-size:11px;letter-spacing:0.14em;color:#BC4A28;font-weight:500;margin-bottom:16px;}.scope{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:32px;}.scopec{padding:32px 28px;border-top:1px solid #E1DACE;}.scopec:not(:last-child){border-right:1px solid #E1DACE;}.scopet{font-family:'Noto Serif JP',serif;font-weight:500;font-size:17px;letter-spacing:0.03em;color:#211C17;}.scoped{margin:12px 0 0;font-size:13px;line-height:1.9;color:#6F6860;}</style></helmet>

<dc-import name="Header" active="recruit" hint-size="100%,73px"></dc-import>

<main style="overflow-x:hidden;">
  <section style="background:#fff;border-bottom:1px solid #E7E1D7;">
    <div class="wrap" style="padding-top:80px;padding-bottom:72px;">
      <div class="eyebrow">RECRUIT</div>
      <h1 class="disp" style="margin:24px 0 0;font-size:40px;line-height:1.5;">採用情報</h1>
      <p class="lead" style="margin:24px 0 0;max-width:600px;">広告で事業を伸ばすことに、一緒に向き合う仲間を募集予定です。</p>
    </div>
  </section>

  <section style="padding:72px 0 96px;">
    <div class="wrap">
      <div class="panel">
        <div>
          <div class="panelbadge">RECRUIT ・ 募集予定</div>
          <h2 class="disp" style="margin:0;font-size:26px;line-height:1.6;">一緒に、広告で<br/>事業を伸ばす仲間を。</h2>
          <p class="lead" style="margin:18px 0 0;max-width:520px;">Meta広告の運用や内製化支援に興味のある方を募集予定です。カジュアル面談から歓迎します。まずはお気軽にお問い合わせください。</p>
        </div>
        <div style="text-align:right;"><a href="contact.dc.html" class="btn" style-hover="background:#BC4A28;">話を聞いてみる</a></div>
      </div>

      <div class="scope">
        <div class="scopec"><div class="scopet">広告運用</div><p class="scoped">Meta広告の設計・配信・改善を担うポジション。</p></div>
        <div class="scopec"><div class="scopet">クリエイティブ</div><p class="scoped">成果につながる広告クリエイティブの企画・制作。</p></div>
        <div class="scopec"><div class="scopet">カジュアル面談</div><p class="scoped">まずは話を聞いてみたい方も歓迎しています。</p></div>
      </div>
    </div>
  </section>
</main>

<dc-import name="Footer" hint-size="100%,300px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:760}}"></script>
</body>
</html>
