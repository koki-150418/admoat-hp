<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/><link rel="stylesheet" href="responsive.css"/><style>*{box-sizing:border-box;}body{margin:0;background:#FAF8F4;color:#211C17;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}a{color:inherit;}.wrap{max-width:1120px;margin:0 auto;padding:0 32px;}.eyebrow{font-size:11px;letter-spacing:0.24em;color:#BC4A28;font-weight:500;}.disp{font-family:'Noto Serif JP',serif;font-weight:400;color:#211C17;letter-spacing:0.03em;}.lead{font-size:15px;line-height:2.2;color:#5A544C;}.btn{display:inline-block;text-decoration:none;font-size:13px;letter-spacing:0.1em;font-weight:500;color:#fff;background:#211C17;padding:16px 34px;border-radius:2px;}.lnk{display:inline-flex;align-items:center;gap:9px;text-decoration:none;font-size:13px;letter-spacing:0.08em;color:#211C17;border-bottom:1px solid #211C17;padding-bottom:4px;}.rowk{font-weight:500;font-size:14px;color:#211C17;}.rowv{font-size:14px;line-height:1.9;color:#5A544C;}</style></helmet>

<dc-import name="Header" active="company" hint-size="100%,73px"></dc-import>

<main style="overflow-x:hidden;">
  <section style="background:#fff;border-bottom:1px solid #E7E1D7;">
    <div class="wrap" style="padding-top:80px;padding-bottom:72px;">
      <div class="eyebrow">COMPANY</div>
      <h1 class="disp" style="margin:24px 0 0;font-size:40px;line-height:1.5;">会社概要</h1>
      <p class="lead" style="margin:24px 0 0;max-width:600px;">合同会社AdMoatの会社情報です。</p>
    </div>
  </section>

  <section style="padding:72px 0 96px;">
    <div class="wrap" style="max-width:820px;">
      <div style="border-top:1px solid #E1DACE;">
        <sc-for list="{{ companyRows }}" as="r" hint-placeholder-count="8">
          <div style="display:grid;grid-template-columns:200px 1fr;gap:20px;padding:22px 4px;border-bottom:1px solid #E1DACE;">
            <div class="rowk">{{ r.k }}</div>
            <div class="rowv">{{ r.v }}</div>
          </div>
        </sc-for>
      </div>
      <div style="margin-top:40px;display:flex;align-items:center;gap:26px;flex-wrap:wrap;">
        <a href="contact.dc.html" class="btn" style-hover="background:#BC4A28;">お問い合わせ</a>
        <a href="message.dc.html" class="lnk" style-hover="color:#BC4A28;border-color:#BC4A28;">代表メッセージを読む</a>
      </div>
    </div>
  </section>
</main>

<dc-import name="Footer" hint-size="100%,300px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:760}}">
class Component extends DCLogic {
  renderVals() {
    const companyRows = [
      { k: '会社名', v: '合同会社AdMoat（アドモート）' },
      { k: '代表社員', v: '池田 昂生' },
      { k: '事業内容', v: 'WEB広告代理事業／広告運用コンサルティング／広告教育事業' },
      { k: '対応領域', v: 'Meta広告（Instagram・Facebook）を中心としたWEB広告全般、店舗集客支援、採用広告支援' },
      { k: '社名の由来', v: '「AdMoat」は Advertising（広告）と Moat（堀）を組み合わせた造語です。広告を、競合に簡単には崩されない“事業の堀”にしたい——そんな想いを込めています。' },
      { k: '所在地', v: '準備が整い次第、掲載いたします' },
      { k: '設立', v: '準備が整い次第、掲載いたします' },
      { k: '連絡先', v: 'info@admoat.net' },
    ];
    return { companyRows };
  }
}
</script>
</body>
</html>
