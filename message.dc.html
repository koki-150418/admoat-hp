<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="responsive.css"/>
<style>
*{box-sizing:border-box;}
body{margin:0;background:#FBFAF7;color:#1A1714;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}
a{color:inherit;}
</style>
</helmet>

<dc-import name="Header" active="company" hint-size="100%,68px"></dc-import>

<main style="overflow-x:hidden;">
  <section style="background:#fff;border-bottom:1px solid #ECE7DE;">
    <div style="max-width:1200px;margin:0 auto;padding:64px 32px 56px;">
      <div style="font-family:Archivo,sans-serif;font-weight:700;font-size:13px;letter-spacing:0.18em;color:#E8401D;">MESSAGE</div>
      <h1 style="margin:14px 0 0;font-weight:900;font-size:44px;letter-spacing:-0.01em;color:#1A1714;">代表メッセージ</h1>
    </div>
  </section>

  <section style="max-width:1100px;margin:0 auto;padding:72px 32px;display:grid;grid-template-columns:0.8fr 1.2fr;gap:56px;align-items:start;">
    <div style="position:relative;border-radius:20px;overflow:hidden;border:1px solid #ECE7DE;aspect-ratio:4/5;background:repeating-linear-gradient(135deg,#F3EEE5 0 14px,#FBFAF7 14px 28px);display:flex;align-items:center;justify-content:center;">
      <span style="font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#9A9488;">[ 代表写真 ]</span>
    </div>
    <div>
      <h2 style="margin:0;font-weight:900;font-size:30px;line-height:1.55;letter-spacing:-0.01em;color:#1A1714;">広告を「コスト」から、<br/>「資産」へ。</h2>
      <p style="margin:24px 0 0;font-size:15.5px;line-height:2.05;color:#4A453D;">広告は、出して終わりではありません。何が効いたのかを数字で捉え、改善を積み重ねることで、成果は再現できる“仕組み”になります。</p>
      <p style="margin:20px 0 0;font-size:15.5px;line-height:2.05;color:#4A453D;">私たちは、ただ運用を代行するだけでなく、お客様自身が広告を武器にできる状態を目指します。だからこそ、運用代行に加えて「内製化支援」という選択肢を大切にしています。</p>
      <p style="margin:20px 0 0;font-size:15.5px;line-height:2.05;color:#4A453D;">広告を、競合に簡単には崩されない事業の強みに。その想いで、一社一社に丁寧に向き合っていきます。</p>
      <div style="margin-top:32px;display:flex;align-items:baseline;gap:12px;">
        <span style="font-size:13px;color:#7C766B;">代表社員</span>
        <span style="font-weight:900;font-size:22px;color:#1A1714;">池田 昂生</span>
      </div>
      <a href="contact.dc.html" style="display:inline-block;margin-top:32px;text-decoration:none;font-size:15px;font-weight:700;color:#fff;padding:14px 28px;border-radius:999px;background:linear-gradient(100deg,#F4B400 0%,#EE7A00 48%,#E8401D 100%);box-shadow:0 8px 22px rgba(232,64,29,0.26);" style-hover="opacity:0.92;">お問い合わせ</a>
    </div>
  </section>
</main>

<dc-import name="Footer" hint-size="100%,320px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:760}}"></script>
</body>
</html>
