<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="responsive.css"/>
<style>*{box-sizing:border-box;}body{margin:0;background:#FBFAF7;color:#1A1714;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}a{color:inherit;text-decoration:none;}.news-grid{display:grid;gap:24px;}.news-card{display:block;border:1px solid #ECE7DE;border-radius:20px;background:#fff;overflow:hidden;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;}.news-card.has-image{display:grid;grid-template-columns:minmax(220px,320px) 1fr;}.news-card-visual{min-height:220px;background:#F3EFE8;}.news-card-visual img{width:100%;height:100%;display:block;object-fit:cover;}.news-card-body{padding:28px 30px 30px;}.news-card-date{font-size:12px;letter-spacing:.08em;color:#A89F92;}.news-card-title{margin:10px 0 0;font-size:28px;line-height:1.45;color:#1A1714;}.news-card-excerpt{margin:14px 0 0;font-size:15px;line-height:1.9;color:#5C564C;}.news-card-link{display:inline-block;margin-top:18px;font-size:13px;font-weight:700;letter-spacing:.08em;color:#E8401D;}@media (max-width:840px){.news-card.has-image{grid-template-columns:1fr;}.news-card-visual{min-height:200px;}.news-card-title{font-size:24px;}}@media (max-width:640px){.news-card-body{padding:22px 22px 24px;}.news-card-title{font-size:22px;}}</style>
</helmet>
<dc-import name="Header" active="news" hint-size="100%,68px"></dc-import>
<main style="overflow-x:hidden;">
  <section style="background:#fff;border-bottom:1px solid #ECE7DE;">
    <div style="max-width:1200px;margin:0 auto;padding:64px 32px 56px;">
      <div style="font-family:Archivo,sans-serif;font-weight:700;font-size:13px;letter-spacing:0.18em;color:#E8401D;">NEWS</div>
      <h1 style="margin:14px 0 0;font-weight:900;font-size:44px;letter-spacing:-0.01em;color:#1A1714;">ニュース</h1>
      <p style="margin:16px 0 0;font-size:16px;line-height:1.85;color:#5C564C;max-width:640px;">サービスや実績に関するお知らせを発信していきます。</p>
    </div>
  </section>
  <section style="max-width:1120px;margin:0 auto;padding:56px 32px 84px;">
    <div class="news-grid"><div style="border:1px solid #ECE7DE;border-radius:20px;padding:72px 32px;text-align:center;background:#fff;"><div style="font-family:Archivo,sans-serif;font-weight:800;font-size:13px;letter-spacing:0.16em;color:#C23A14;">COMING SOON</div><p style="margin:16px 0 0;font-size:16px;line-height:1.9;color:#5C564C;">最新のお知らせは準備中です。<br/>更新情報は、こちらのページで順次お届けします。</p><a href="contact.dc.html" style="display:inline-block;margin-top:28px;text-decoration:none;font-size:15px;font-weight:700;color:#fff;padding:14px 28px;border-radius:999px;background:linear-gradient(100deg,#F4B400 0%,#EE7A00 48%,#E8401D 100%);box-shadow:0 8px 22px rgba(232,64,29,0.26);" style-hover="opacity:0.92;">お問い合わせ</a></div></div>
  </section>
</main>
<dc-import name="Footer" hint-size="100%,320px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:1440}}"></script>
</body>
</html>
