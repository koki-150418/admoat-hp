<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/><link rel="stylesheet" href="responsive.css"/><style>*{box-sizing:border-box;}body{margin:0;background:#FAF8F4;color:#211C17;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}a{color:inherit;}.wrap{max-width:1120px;margin:0 auto;padding:0 32px;}.eyebrow{font-size:11px;letter-spacing:0.24em;color:#BC4A28;font-weight:500;}.disp{font-family:'Noto Serif JP',serif;font-weight:400;color:#211C17;letter-spacing:0.03em;}.lead{font-size:15px;line-height:2.2;color:#5A544C;}.btn{display:inline-block;text-decoration:none;font-size:13px;letter-spacing:0.1em;font-weight:500;color:#fff;background:#211C17;padding:16px 34px;border-radius:2px;}</style></helmet>

<dc-import name="Header" active="news" hint-size="100%,73px"></dc-import>

<main style="overflow-x:hidden;">
  <section style="background:#fff;border-bottom:1px solid #E7E1D7;">
    <div class="wrap" style="padding-top:80px;padding-bottom:72px;">
      <div class="eyebrow">NEWS</div>
      <h1 class="disp" style="margin:24px 0 0;font-size:40px;line-height:1.5;">お知らせ</h1>
      <p class="lead" style="margin:24px 0 0;max-width:600px;">サービスや事例に関するお知らせを発信していきます。</p>
    </div>
  </section>

  <section style="padding:16px 0 96px;">
    <div class="wrap" style="max-width:760px;">
      <sc-for list="{{ news }}" as="n" hint-placeholder-count="1">
        <div style="padding:28px 0;border-bottom:1px solid #E7E1D7;display:flex;gap:24px;align-items:baseline;">
          <span style="flex:none;font-size:13px;color:#A89F92;letter-spacing:0.04em;">{{ n.date }}</span>
          <p style="margin:0;font-size:14.5px;line-height:1.9;color:#3A352E;">{{ n.body }}</p>
        </div>
      </sc-for>
    </div>
  </section>
</main>

<dc-import name="Footer" hint-size="100%,300px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:640}}">
class Component extends DCLogic {
  renderVals() {
    const news = [
      /* NEWS:START */
      { date: '2025', body: '開業支援ブランド「ケイトステージラッシュ」様のMeta広告運用を担当させていただくことになりました。' },
      /* NEWS:END */
    ];
    return { news };
  }
}
</script>
</body>
</html>
