<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"/>
</helmet>
<header style="position:fixed;top:0;left:0;right:0;width:100%;z-index:60;background:rgba(251,250,247,0.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid #ECE7DE;">
  <div style="max-width:1200px;margin:0 auto;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px;">
    <a href="./" style="display:flex;align-items:center;gap:11px;text-decoration:none;">
      <img src="assets/logo.png" alt="AdMoat" style="height:30px;width:auto;display:block;"/>
      <span style="font-family:Archivo,sans-serif;font-weight:800;font-size:20px;letter-spacing:-0.01em;color:#1A1714;">AdMoat</span>
    </a>
    <nav style="display:flex;align-items:center;gap:28px;flex-wrap:wrap;justify-content:flex-end;">
      <sc-for list="{{ links }}" as="it" hint-placeholder-count="4">
        <a href="{{ it.href }}" style="{{ it.style }}" style-hover="color:#E8401D;">{{ it.label }}</a>
      </sc-for>
      <a href="contact.dc.html" style="text-decoration:none;font-size:14px;font-weight:700;color:#fff;padding:10px 20px;border-radius:999px;background:linear-gradient(100deg,#F4B400 0%,#EE7A00 48%,#E8401D 100%);box-shadow:0 4px 14px rgba(232,64,29,0.28);" style-hover="opacity:0.92;">無料相談</a>
    </nav>
  </div>
</header>
<div style="height:67px;"></div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:68},&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active ?? '';
    const items = [
      { label: 'サービス', href: 'services.dc.html', key: 'services' },
      { label: '実績', href: 'works.dc.html', key: 'works' },
      { label: '会社概要', href: 'company.dc.html', key: 'company' },
      { label: 'ブログ', href: 'blog.dc.html', key: 'blog' },
      { label: '採用', href: 'recruit.dc.html', key: 'recruit' },
    ];
    const links = items.map(it => ({
      label: it.label,
      href: it.href,
      style: {
        textDecoration: 'none',
        fontSize: '14px',
        fontWeight: active === it.key ? 700 : 500,
        color: active === it.key ? '#E8401D' : '#3A352E',
      },
    }));
    return { links };
  }
}
</script>
</body>
</html>
