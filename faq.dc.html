<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="responsive.css"/>
<style>
*{box-sizing:border-box;}
body{margin:0;background:#FBFAF7;color:#1A1714;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}
a{color:inherit;}
</style>
</helmet>

<dc-import name="Header" active="" hint-size="100%,68px"></dc-import>

<main style="overflow-x:hidden;">
  <section style="background:#fff;border-bottom:1px solid #ECE7DE;">
    <div style="max-width:1200px;margin:0 auto;padding:64px 32px 56px;">
      <div style="font-family:Archivo,sans-serif;font-weight:700;font-size:13px;letter-spacing:0.18em;color:#E8401D;">FAQ</div>
      <h1 style="margin:14px 0 0;font-weight:900;font-size:44px;letter-spacing:-0.01em;color:#1A1714;">よくあるご質問</h1>
    </div>
  </section>

  <section style="max-width:840px;margin:0 auto;padding:72px 32px;">
    <div style="display:flex;flex-direction:column;gap:12px;">
      <sc-for list="{{ faqs }}" as="f" hint-placeholder-count="5">
        <div style="background:#fff;border:1px solid #ECE7DE;border-radius:14px;overflow:hidden;">
          <button type="button" onClick="{{ f.onToggle }}" style="width:100%;text-align:left;background:transparent;border:none;cursor:pointer;padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;font-family:'Noto Sans JP',sans-serif;">
            <span style="font-weight:700;font-size:16px;color:#1A1714;line-height:1.5;">{{ f.q }}</span>
            <span style="flex:none;width:28px;height:28px;border-radius:50%;background:linear-gradient(100deg,#F4B400,#E8401D);color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;">{{ f.sign }}</span>
          </button>
          <sc-if value="{{ f.open }}" hint-placeholder-val="{{ false }}">
            <div style="padding:0 24px 24px;font-size:14.5px;line-height:1.9;color:#5C564C;">{{ f.a }}</div>
          </sc-if>
        </div>
      </sc-for>
    </div>
    <div style="margin-top:40px;text-align:center;">
      <p style="margin:0;font-size:15px;color:#5C564C;">解決しないご質問は、お気軽にお問い合わせください。</p>
      <a href="contact.dc.html" style="display:inline-block;margin-top:20px;text-decoration:none;font-size:15px;font-weight:700;color:#fff;padding:14px 28px;border-radius:999px;background:linear-gradient(100deg,#F4B400 0%,#EE7A00 48%,#E8401D 100%);box-shadow:0 8px 22px rgba(232,64,29,0.26);" style-hover="opacity:0.92;">お問い合わせ</a>
    </div>
  </section>
</main>

<dc-import name="Footer" hint-size="100%,320px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:760}}">
class Component extends DCLogic {
  state = { openFaq: 0 };
  renderVals() {
    const faqSrc = [
      { q: '最低出稿金額はありますか？', a: '事業フェーズやご予算に合わせて柔軟にご提案します。まずはお気軽にご相談ください。' },
      { q: 'Meta広告以外も相談できますか？', a: 'Meta広告を軸としていますが、お客様の状況に応じてWEB広告全般のご相談に対応します。' },
      { q: '運用代行と内製化支援の違いは？', a: '代行は配信・改善まで当社が実行します。内製化支援は、貴社が自走できるよう伴走しながらノウハウを移管していきます。' },
      { q: '契約期間の縛りはありますか？', a: '成果と継続性を重視しています。条件はサービス内容に応じて丁寧にご説明します。' },
      { q: '遠方でも対応できますか？', a: 'オンライン定例・チャット相談を基本としているため、全国どこでも対応が可能です。' },
    ];
    const faqs = faqSrc.map((f, i) => ({
      ...f,
      open: this.state.openFaq === i,
      sign: this.state.openFaq === i ? '−' : '+',
      onToggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i })),
    }));
    return { faqs };
  }
}
</script>
</body>
</html>
